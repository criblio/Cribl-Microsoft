<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        color-scheme: dark;

      body {

        font-family:

  <body>
    <div class="card">
      <h1>SOC Optimization Toolkit for Microsoft Sentinel</h1>
      <p class="muted">Phase 0 desktop shell.</p>
