# Product API access declaration. Declare Cribl product API paths your app needs to access.
# At install time, admins see exactly which platform resources the app will use.
#
# Same-PR contract: every product API path the code calls is declared here in
# the same change that introduces the call, and nothing more (least
# privilege). App-scoped paths (/a/{appId}/kvstore/*, /a/{appId}/proxy/*) are
# granted automatically via the AppUser role and are NOT redeclared here.
#
# Current callers: src/platform/adapters.ts PlatformCriblClient, driving the
# @soc/core onboardTable use-case. Path shapes match the vendored
# packages/core/assets/cribl-openapi.json:
#   /master/groups (get)               - listGroups() group picker
#   /system/outputs (post)             - in /m/{groupId} context: create the
#                                        Sentinel destination
#   /system/outputs/{id} (get)         - in /m/{groupId} context: verify step
#                                        reads the created destination back
#   /version/commit (post)             - in /m/{groupId} context: commit the
#                                        group's pending config
#   /master/groups/{id}/deploy (patch) - leader-level deploy of the committed
#                                        version to the group
#   /packs (get/put/post)              - in /m/{groupId} context: pack inventory
#                                        (PlatformPackInstall) - GET lists
#                                        installed packs (deployed-status truth),
#                                        PUT ?filename= uploads the .crbl bytes,
#                                        POST installs the returned source
#   /packs/{id} (patch/delete)         - in /m/{groupId} context: PATCH is the
#                                        documented in-place pack upgrade (the
#                                        duplicate-conflict reinstall), DELETE
#                                        the last-resort conflict cleanup
#
# LEAST PRIVILEGE / same-PR honesty: Unit 19's pack surface installs a
# self-contained .crbl. The pack's breakers.yml, outputs.yml, and any secret
# reference travel INSIDE the archive (regenerated deterministically from the
# stored definition), so Unit 19 calls no group-level /lib/breakers or
# /system/secrets create-or-update endpoints. (/system/outputs is already
# declared above for the onboard-table destination step.)
#
# Unit 20 (guided deploy: post-deploy SOURCE WIRING + the connected-path secret)
# ADDS exactly the paths its code calls, and nothing more:
#   /m/{groupId}/routes (get/put)            - wireSource GETs the group's
#                                              routes, prepends the Sentinel
#                                              (+ optional Lake) routes in
#                                              evaluation order, and PUTs the
#                                              merged config back
#   /m/{groupId}/system/secrets (post)       - ensure-secret create of the named
#                                              text secret sentinel_client_secret
#   /m/{groupId}/system/secrets/{id} (patch) - ensure-secret update on a 409
#                                              (create-or-update)
#   /system/lake/datasets (post)             - CLOUD-ONLY Cribl Lake dataset
#                                              create (409/exists is success); a
#                                              leader route, no /m/ prefix
# The wiring's commit (/m/{groupId}/version/commit) and deploy
# (/master/groups/{groupId}/deploy) reuse the routes ALREADY declared below and
# are not redeclared. Live input creation (/system/inputs) is NOT shipped, so it
# is deliberately absent (least privilege).

policies:
  # List Worker Groups / Edge Fleets (CriblClient.listGroups group picker).
  - object: '/master/groups'
    actions: ['GET']
  # Create the Sentinel destination in a Worker Group context (onboard-table
  # step create-cribl-destination). Nothing lists the collection yet, so only
  # POST is declared (least privilege).
  - object: '/m/:gid/system/outputs'
    actions: ['POST']
  # Read an individual destination back (onboard-table verify step GETs
  # /m/{groupId}/system/outputs/{id}).
  - object: '/m/:gid/system/outputs/*'
    actions: ['GET']
  # Commit the group's pending config (onboard-table commit-and-deploy step;
  # the top-level /version/commit route called in /m/{groupId} context).
  - object: '/m/:gid/version/commit'
    actions: ['POST']
  # Deploy the committed version to the group. This is a LEADER route (no
  # /m/ prefix), called as PATCH /master/groups/{groupId}/deploy.
  - object: '/master/groups/:id/deploy'
    actions: ['PATCH']
  # Pack inventory + two-step install in a Worker Group context
  # (PlatformPackInstall): GET lists the group's installed packs (the
  # deployed-status truth for the badges), PUT ?filename= uploads the .crbl
  # bytes, POST installs the returned randomized source.
  - object: '/m/:gid/packs'
    actions: ['GET', 'PUT', 'POST']
  # Existing pack by id: PATCH is the documented in-place upgrade (the
  # duplicate-conflict reinstall path - id and route references preserved);
  # DELETE is the last-resort conflict cleanup.
  - object: '/m/:gid/packs/*'
    actions: ['PATCH', 'DELETE']
  # Unit 20 source wiring: read the group's routes and PUT the merged config
  # back (wireSource prepends the Sentinel + optional Lake routes in evaluation
  # order). GET + PUT only - the wiring never deletes a route.
  - object: '/m/:gid/routes'
    actions: ['GET', 'PUT']
  # Unit 20 ensure-secret (connected path): create the named text secret
  # sentinel_client_secret the Sentinel destination references. POST only.
  - object: '/m/:gid/system/secrets'
    actions: ['POST']
  # Unit 20 ensure-secret update on a 409 (create-or-update): PATCH the existing
  # named secret in place.
  - object: '/m/:gid/system/secrets/*'
    actions: ['PATCH']
  # Unit 20 CLOUD-ONLY Cribl Lake dataset create (full-fidelity federation);
  # 409/exists is treated as success. A LEADER route (no /m/ prefix).
  - object: '/system/lake/datasets'
    actions: ['POST']
